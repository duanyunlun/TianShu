<svg xmlns="http://www.w3.org/2000/svg" width="430" height="140" viewBox="0 0 430 140" role="img" aria-labelledby="title">
  <title id="title">天枢 TianShu</title>

  <!-- ===== mark ===== -->
  <g transform="translate(70 70)">
    <!-- outer orbit ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#5B7E9E" stroke-width="4.5" />
    <!-- compass star (4-point) -->
    <path d="M0 -50 L11 -11 L50 0 L11 11 L0 50 L-11 11 L-50 0 L-11 -11 Z" fill="#5B7E9E" />
    <!-- pivot dot (north star) -->
    <circle cx="0" cy="0" r="8" fill="#E8B04B" />
    <!-- orbiting satellite dot, upper-right on the ring -->
    <circle cx="36.8" cy="-36.8" r="8.5" fill="#E8B04B" />
  </g>

  <!-- ===== wordmark: 大号中文在上, 小号宽距英文在下 ===== -->
  <text x="160" y="84"
        font-family="'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif"
        font-size="72" font-weight="700" letter-spacing="10" fill="#6E92B8">天枢</text>
  <text x="167" y="116"
        font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="18" font-weight="500" letter-spacing="13" fill="#7A8794">TIANSHU</text>
</svg>
