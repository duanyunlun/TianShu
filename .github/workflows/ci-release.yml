name: CI and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build and P0 tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore CLI test graph
        run: dotnet restore tests/TianShu.Cli.Tests/TianShu.Cli.Tests.csproj

      - name: Build CLI
        run: dotnet build src/Presentations/TianShu.Cli/TianShu.Cli.csproj --configuration Release --no-restore --nologo --verbosity:minimal

      - name: Test CLI first-run bootstrap
        run: dotnet test tests/TianShu.Cli.Tests/TianShu.Cli.Tests.csproj --configuration Release --nologo --logger "console;verbosity=minimal" --filter "FullyQualifiedName~CliFirstRunBootstrapTests" -m:1

      - name: Test configuration public schema guard
        run: dotnet test tests/TianShu.Configuration.Tests/TianShu.Configuration.Tests.csproj --configuration Release --nologo --logger "console;verbosity=minimal" --filter "FullyQualifiedName~ConfigSchemaDocs_DoNotReintroduceRemovedLegacyRootFieldsAsFormalInputs" -m:1

      - name: Test installer preservation guard
        run: dotnet test tests/TianShu.Execution.Integration.Tests/TianShu.Execution.Integration.Tests.csproj --configuration Release --nologo --logger "console;verbosity=minimal" --filter "FullyQualifiedName~InstallScriptConfigurationPreservationTests" -m:1

      - name: Test v0.6 module release gate
        shell: pwsh
        run: ./tools/Test-TianShuV06ModuleReleaseGate.ps1 -Configuration Release

      - name: Test v0.7 capability release gate
        shell: pwsh
        run: ./tools/Test-TianShuV07CapabilityReleaseGate.ps1 -Configuration Release

      - name: Test v0.8 remote continuity release gate
        shell: pwsh
        run: ./tools/Test-TianShuV08RemoteContinuityReleaseGate.ps1 -Configuration Release

      - name: Test v0.9 multi-agent release gate
        shell: pwsh
        run: ./tools/Test-TianShuV09MultiAgentReleaseGate.ps1 -Configuration Release

      - name: Test v1.0 production documentation gate
        shell: pwsh
        run: ./tools/Test-TianShuV10DocumentationReleaseGate.ps1 -Configuration Release

      - name: Test public release safety scan
        shell: pwsh
        run: ./tools/Test-TianShuPublicReleaseSafetyScan.ps1 -Configuration Release

      - name: Test release acceptance gate
        shell: pwsh
        run: ./tools/Test-TianShuReleaseAcceptanceGate.ps1 -Configuration Release

      - name: Test P31.5 CI matrix regression
        run: dotnet test tests/TianShu.Execution.Integration.Tests/TianShu.Execution.Integration.Tests.csproj --configuration Release --nologo --logger "console;verbosity=minimal" --filter "FullyQualifiedName~P31_5_CrossPlatformCiMatrix" -m:1

  cross-platform-source-smoke:
    name: Source CLI smoke (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-26
            rid: osx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore, build, init, and doctor from source
        shell: pwsh
        run: ./tools/Test-TianShuCrossPlatformCliSourceSmoke.ps1 -Configuration Release

  package-cli:
    name: Package CLI
    runs-on: windows-latest
    needs:
      - build-test
      - cross-platform-source-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Package directory-style CLI archives
        shell: pwsh
        run: ./tools/Publish-TianShuCliRelease.ps1 -Configuration Release -Version "${{ github.ref_name }}"

      - name: Validate release manifest
        shell: pwsh
        run: ./tools/Test-TianShuReleaseManifest.ps1 -PackagesRoot artifacts/release/packages -Version "${{ github.ref_name }}"

      - name: Upload release packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: tianshu-portable-release-packages
          path: artifacts/release/packages/*
          if-no-files-found: error

  release-smoke:
    name: Release package smoke (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: package-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-26
            rid: osx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          name: tianshu-portable-release-packages
          path: artifacts/release/packages

      - name: Smoke release package
        shell: pwsh
        run: ./tools/Test-TianShuCliReleasePackage.ps1 -PackagesRoot artifacts/release/packages -RuntimeIdentifier "${{ matrix.rid }}"

  github-release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs:
      - package-cli
      - release-smoke
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          name: tianshu-portable-release-packages
          path: artifacts/release/packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/packages/*
          generate_release_notes: true
