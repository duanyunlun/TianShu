# TianShu official builtin tool package manifest.
# 官方内置工具包随 TianShu 一起安装；用户可在 tianshu.toml 中覆盖启停与实现选择。

id = "builtin"
display_name = "TianShu Builtin Tools"
enabled = true
type = "builtin"
priority = 0

[[providers]]
id = "shell"
enabled = true
type = "assembly"
assembly_path = "./shell/TianShu.Tools.Shell.dll"
provider_type = "TianShu.Tools.Shell.ShellToolProvider"
priority = 10
replace_existing = true

